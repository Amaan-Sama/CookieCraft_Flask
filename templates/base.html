<!doctype html>
<html lang="en">

<head>

     <meta charset="utf-8">
     <meta name="viewport"
          content="width=device-width, initial-scale=1">

     <title>
          {% block title %}
          {% endblock title %}
     </title>

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">




<style>

body{
     background: linear-gradient(to bottom right,#fff8f0,#ffe8d6);
     min-height: 100vh;
     font-family: 'Segoe UI', sans-serif;
}



/* NAVBAR */

.custom-navbar{

     background: linear-gradient(to right,#111827,#1f2937);

     padding-top: 12px;
     padding-bottom: 12px;

     box-shadow: 0px 4px 20px rgba(0,0,0,0.25);
}



.brand-text{

     font-size: 1.8rem;
     font-weight: 700;
     color: #ffb347;

     margin-left: 12px;
}



.nav-custom{

     color: white !important;

     font-weight: 600;

     padding: 10px 18px !important;

     border-radius: 12px;

     transition: 0.3s ease;
}



.nav-custom:hover{

     background: linear-gradient(to right,#ff9a3c,#ff6b6b);

     transform: translateY(-2px);

     color: white !important;
}



.search-box{

     border-radius: 12px;

     border: none;

     padding: 10px;
}



.search-btn{

     background: linear-gradient(to right,#ff9a3c,#ff6b6b);

     border: none;

     color: white;

     border-radius: 12px;

     padding: 10px 18px;

     font-weight: 600;

     transition: 0.3s ease;
}



.search-btn:hover{

     opacity: 0.92;

     transform: scale(1.03);
}



/* FOOTER */

.custom-footer{

     background: linear-gradient(to right,#111827,#1f2937);

     color: white;

     margin-top: 70px;

     padding-top: 25px;

     padding-bottom: 25px;

     box-shadow: 0px -4px 15px rgba(0,0,0,0.15);
}



.footer-title{

     color: #ffb347;

     font-size: 1.4rem;

     font-weight: 700;
}



.footer-link{

     color: #ffb347;

     text-decoration: none;

     transition: 0.3s ease;
}



.footer-link:hover{

     color: white;
}



.footer-text{

     opacity: 0.85;
}

</style>

</head>



<body>


<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

     <div class="container-fluid px-4">


          <!-- LOGO -->

          <a class="navbar-brand d-flex align-items-center"
               href="/">

               <img src="{{url_for('static', filename='logo_chat.png')}}"
                    width="65"
                    height="65"
                    class="rounded-circle">

               <span class="brand-text">
                    CookieCraft
               </span>

          </a>



          <!-- MOBILE BUTTON -->

          <button class="navbar-toggler"
               type="button"
               data-bs-toggle="collapse"
               data-bs-target="#navbarSupportedContent">

               <span class="navbar-toggler-icon"></span>

          </button>



          <!-- NAVBAR CONTENT -->

          <div class="collapse navbar-collapse"
               id="navbarSupportedContent">



               <!-- NAV LINKS -->

               <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-4 gap-2">


                    <li class="nav-item">

                         <a class="nav-link nav-custom active"
                              href="/">

                              Home

                         </a>

                    </li>



                    <li class="nav-item">

                         <a class="nav-link nav-custom"
                              href="/about">

                              About Us

                         </a>

                    </li>

               </ul>




               <!-- SEARCH -->

               <form class="d-flex"
                    role="search"
                    action="/display"
                    method="POST">


                    <input class="form-control me-2 search-box"
                         type="search"
                         name="sea"
                         placeholder="Search Recipes">


                    <button class="btn search-btn"
                         type="submit">

                         Search

                    </button>

               </form>

          </div>

     </div>

</nav>




<!-- BODY -->

{% block body %}

{% endblock body %}




<!-- FOOTER -->

<footer class="custom-footer text-center">

     <div class="container">

          <div class="footer-title mb-2">
               🍪 CookieCraft
          </div>

          <div class="footer-text mb-3">

               recipe generation platform built using
               Flask, SQLAlchemy.

          </div>

          <div>

               <a href="/"
                    class="footer-link me-3">

                    Home

               </a>


               <a href="/about"
                    class="footer-link">

                    About

               </a>

          </div>

          <div class="footer-text mt-4">

               © 2026 CookieCraft — All Rights Reserved

          </div>

     </div>

</footer>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
